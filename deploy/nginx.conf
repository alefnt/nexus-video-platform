# Nexus Video Platform — Nginx Reverse Proxy
#
# Aggregates all 18 microservices behind a single port (80/443).
# Routes based on URL prefix → upstream service port.
#
# Usage:
#   docker run -v ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro -p 80:80 -p 443:443 nginx:alpine

worker_processes auto;
events { worker_connections 4096; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 2G;

    # ─── Gzip ────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ─── Security Headers ────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Rate Limiting ───────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

    # ─── Upstreams ───────────────────────────────────
    upstream identity       { server 127.0.0.1:8080; }
    upstream content        { server 127.0.0.1:8081; }
    upstream payment        { server 127.0.0.1:8082; }
    upstream live           { server 127.0.0.1:8083; }
    upstream nft            { server 127.0.0.1:8084; }
    upstream transcode      { server 127.0.0.1:8085; }
    upstream engagement     { server 127.0.0.1:8086; }
    upstream metadata       { server 127.0.0.1:8087; }
    upstream search         { server 127.0.0.1:8088; }
    upstream moderation     { server 127.0.0.1:8089; }
    upstream messaging      { server 127.0.0.1:8090; }
    upstream governance     { server 127.0.0.1:8091; }
    upstream royalty         { server 127.0.0.1:8092; }
    upstream bridge         { server 127.0.0.1:8093; }
    upstream achievement    { server 127.0.0.1:8094; }
    upstream recommendation { server 127.0.0.1:8105; }
    upstream ai_generation  { server 127.0.0.1:8105; }
    upstream collaboration  { server 127.0.0.1:8106; }

    server {
        listen 80;
        server_name _;

        # ─── Frontend (Vite build) ───────────────────
        location / {
            root /var/www/nexus/client-web/dist;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|webp|avif)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ─── API Gateway Routes ──────────────────────

        # Auth / Identity
        location /auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Content
        location /content/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://content;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Metadata
        location /metadata/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://metadata;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Payment
        location /payment/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Generation
        location /ai/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://ai_generation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # SSE support
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # Live Streaming
        location /live/ {
            proxy_pass http://live;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # NFT
        location /nft/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://nft;
            proxy_set_header Host $host;
        }

        # Search
        location /search/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://search;
            proxy_set_header Host $host;
        }

        # Engagement
        location /engagement/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://engagement;
            proxy_set_header Host $host;
        }

        # Messaging (WebSocket)
        location /messaging/ {
            proxy_pass http://messaging;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # Recommendation
        location /recommendation/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://recommendation;
            proxy_set_header Host $host;
        }

        # DAO / Governance
        location /governance/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://governance;
            proxy_set_header Host $host;
        }

        # Royalty
        location /royalty/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://royalty;
            proxy_set_header Host $host;
        }

        # Achievement
        location /achievement/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://achievement;
            proxy_set_header Host $host;
        }

        # Bridge
        location /bridge/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://bridge;
            proxy_set_header Host $host;
        }

        # Transcode
        location /transcode/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://transcode;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        # Moderation
        location /moderation/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://moderation;
            proxy_set_header Host $host;
        }

        # Collaboration
        location /collaboration/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://collaboration;
            proxy_set_header Host $host;
        }

        # Health check aggregation
        location /health {
            proxy_pass http://identity/health;
        }
    }
}
