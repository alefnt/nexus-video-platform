# Prometheus Alert Rules for Nexus Video Platform
# Phase 8: Production monitoring and alerting

groups:
  - name: nexus_service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_request_duration_seconds_count{status=~"5.."}[5m]) / rate(http_request_duration_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is above 5% for the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "95th percentile latency is above 2 seconds."

  - name: nexus_resource_alerts
    interval: 60s
    rules:
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 512
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Memory usage exceeds 512MB."

      - alert: TooManyOpenConnections
        expr: process_open_fds > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many open file descriptors on {{ $labels.job }}"

  - name: nexus_payment_alerts
    interval: 30s
    rules:
      - alert: PaymentFailureSpike
        expr: rate(payment_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Payment failure spike detected"
          description: "Payment failures exceeding 6/min for 2+ minutes."

      - alert: SettlementQueueBacklog
        expr: queue_waiting_count{queue="settlement"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Settlement queue backlog"
          description: "More than 100 settlement jobs waiting."

  - name: nexus_database_alerts
    interval: 60s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count > 18
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          
      - alert: SlowQueries
        expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
