# Kubernetes 命名空间和通用配置
# FILE: /video-platform/deploy/k8s/base/namespace.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: video-platform
  labels:
    app.kubernetes.io/name: video-platform
---
# ConfigMap - 非敏感配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: video-platform-config
  namespace: video-platform
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  ENABLE_TRACING: "true"
  
  # 服务端口
  IDENTITY_PORT: "8080"
  PAYMENT_PORT: "8091"
  CONTENT_PORT: "8092"
  METADATA_PORT: "8093"
  ROYALTY_PORT: "8094"
  NFT_PORT: "8095"
  LIVE_PORT: "8096"
  ACHIEVEMENT_PORT: "8097"
  GOVERNANCE_PORT: "8098"
  BRIDGE_PORT: "8099"
  TRANSCODE_PORT: "8100"
  SEARCH_PORT: "8101"
  MODERATION_PORT: "8102"
  MESSAGING_PORT: "8103"
  ENGAGEMENT_PORT: "8104"

  # 内部服务 URL
  PAYMENT_URL: "http://payment:8091"
  CONTENT_URL: "http://content:8092"
  METADATA_URL: "http://metadata:8093"
  ROYALTY_URL: "http://royalty:8094"
  NFT_URL: "http://nft:8095"
  LIVE_URL: "http://live:8096"
  ACHIEVEMENT_URL: "http://achievement:8097"
  ENGAGEMENT_URL: "http://engagement:8104"
---
# Secret 模板 (需要用 kubectl create secret 创建实际值)
apiVersion: v1
kind: Secret
metadata:
  name: video-platform-secrets
  namespace: video-platform
type: Opaque
stringData:
  # 以下值需要替换为实际密钥
  DATABASE_URL: "postgresql://nexus:CHANGE_ME@postgres:5432/nexus_video"
  JWT_SECRET: "CHANGE_ME_32_CHARS_MINIMUM"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"
