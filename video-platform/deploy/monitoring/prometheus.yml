global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Identity Service (API Gateway)
  - job_name: 'identity'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/metrics'

  # Payment Service
  - job_name: 'payment'
    static_configs:
      - targets: ['host.docker.internal:8091']
    metrics_path: '/metrics'

  # Content Service
  - job_name: 'content'
    static_configs:
      - targets: ['host.docker.internal:8092']
    metrics_path: '/metrics'

  # Metadata Service
  - job_name: 'metadata'
    static_configs:
      - targets: ['host.docker.internal:8093']
    metrics_path: '/metrics'

  # Royalty Service
  - job_name: 'royalty'
    static_configs:
      - targets: ['host.docker.internal:8094']
    metrics_path: '/metrics'

  # NFT Service
