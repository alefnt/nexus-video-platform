[databases]
nexus_video = host=postgres port=5432 dbname=nexus_video

[pgbouncer]
; Connection pooling mode
; transaction = pool is returned after transaction ends
; session = pool is returned after client disconnects  
pool_mode = transaction

; Max connections to PostgreSQL
default_pool_size = 20

; Max client connections
max_client_conn = 200

; Reserve connections for admin
reserve_pool_size = 5

; Timeout for unused connections
server_idle_timeout = 600

; Connection lifetime
server_lifetime = 3600

; Log connections and disconnections
log_connections = 1
log_disconnections = 1

; Stats collection period
stats_period = 60

; Listen configuration
listen_addr = 0.0.0.0
listen_port = 6432

; Auth
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Admin access
admin_users = nexus
stats_users = nexus_stats
