# FILE: /video-platform/deploy/database/pg_hba.conf
# PostgreSQL Host-Based Authentication 配置

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# 本地连接
local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# 应用连接
host    all             nexus           0.0.0.0/0               scram-sha-256
host    all             readonly        0.0.0.0/0               scram-sha-256

# 复制连接
host    replication     replication     0.0.0.0/0               scram-sha-256

# PgBouncer 连接
host    all             all             pgbouncer               scram-sha-256
