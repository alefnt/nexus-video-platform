global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nexus-gateway'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: /metrics

  - job_name: 'nexus-identity'
    static_configs:
      - targets: ['localhost:8081']
    metrics_path: /metrics

  - job_name: 'nexus-metadata'
    static_configs:
      - targets: ['localhost:8082']
    metrics_path: /metrics

  - job_name: 'nexus-content'
    static_configs:
      - targets: ['localhost:8090']
    metrics_path: /metrics

  - job_name: 'nexus-payment'
    static_configs:
      - targets: ['localhost:8092']
    metrics_path: /metrics

  - job_name: 'nexus-live'
    static_configs:
      - targets: ['localhost:8095']
    metrics_path: /metrics

  - job_name: 'nexus-engagement'
    static_configs:
      - targets: ['localhost:8096']
    metrics_path: /metrics

  - job_name: 'nexus-messaging'
    static_configs:
      - targets: ['localhost:8103']
    metrics_path: /metrics

  - job_name: 'nexus-ai-generation'
    static_configs:
      - targets: ['localhost:8105']
    metrics_path: /metrics
